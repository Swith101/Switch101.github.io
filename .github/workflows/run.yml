name: CNN新闻定时抓取
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖库
        run: pip install -r requirements.txt
      - name: 执行爬虫
        run: python cnn.py
      - name: 保存抓取结果
        run: |
          git config --global user.name "AutoCrawlBot"
          git config --global user.email "bot@github.com"
          git add cnn_news.csv cnn_news.json
          git diff --quiet && git diff --staged --quiet || git commit -m "更新CNN新闻数据"
          git push
